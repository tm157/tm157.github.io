<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>">
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
</head>
<body>
  <div class="container">
    <nav>
      <a href="{{ "/" | relative_url }}" class="nav-name">Tanya Marwah</a>
      <div class="nav-links">
        <a href="{{ "/publications" | relative_url }}">publications</a>
        <a href="{{ "/writings" | relative_url }}">writings</a>
        <!-- <a href="{{ "/mentoring" | relative_url }}">mentoring</a> -->
      </div>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer>
      <a href="{{ site.github.tm_github_url }}">github</a>
      <a href="{{ site.github.tm_google_scholar }}">scholar</a>
      <a href="mailto:tmarwah@andrew.cmu.edu">email</a>
    </footer>
  </div>
</body>
</html>
